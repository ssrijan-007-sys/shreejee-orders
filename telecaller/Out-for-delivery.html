<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Out For Delivery</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module" src="js/ofd-alert-engine.js"></script>

<script type="module">
import { db, ref, onValue, set, get, remove } from "../firebase/firebase-config.js";

const authUser = JSON.parse(localStorage.getItem("authUser"));
if (!authUser) location.href="../index.html";

const emailKey = authUser.email.replace(/[.@]/g, "_");
const container = document.getElementById("ofdContainer");

/* ================= LOAD OFD ================= */

const trackingListeners = {};

onValue(ref(db, `Telecallers/${emailKey}/OFD`), snap => {

  const ofd = snap.val() || {};
  container.innerHTML = "";

  Object.keys(ofd).forEach(awb => {

    if (trackingListeners[awb]) return;
    trackingListeners[awb] = true;

    onValue(ref(db, `Tracking/${awb}`), async trackSnap => {

      const tracking = trackSnap.val();
      if (!tracking) return;

      const status = tracking.status;

      /* REMOVE FINAL STATES */
      if (status === "DELIVERED" || status === "RTO") {
        await remove(ref(db, `Telecallers/${emailKey}/OFD/${awb}`));
        return;
      }

      /* ===== ATTEMPT INCREMENT ===== */
      if (status === "OUT FOR DELIVERY") {

        const ofdRef = ref(db, `Telecallers/${emailKey}/OFD/${awb}`);
        const ofdSnap = await get(ofdRef);
        const ofdData = ofdSnap.val() || {};

        const currentUpdate = tracking.updatedAt || 0;
        const lastRecorded = ofdData.lastOFDUpdate || 0;

        if (currentUpdate && currentUpdate !== lastRecorded) {

          const newAttempt = (ofdData.attempt || 0) + 1;

          await set(ofdRef, {
            ...ofdData,
            attempt: newAttempt,
            lastOFDUpdate: currentUpdate
          });
        }
      }

      /* HIDE IF NOT OFD */
      if (status !== "OUT FOR DELIVERY") {
        const existing = document.getElementById(`ofd-${awb}`);
        if (existing) existing.remove();
        return;
      }

      /* RENDER CARD */
      findOrderByAwbRealtime(awb, (order) => {

        if (!order) return;

        const existing = document.getElementById(`ofd-${awb}`);
        if (existing) existing.remove();

        const card = createCard(order, awb);
        container.appendChild(card);
      });

    });

  });

});


/* ================= FIND ORDER ================= */

function findOrderByAwbRealtime(awb, callback) {

  onValue(ref(db, "Telecallers"), snap => {

    const telecallers = snap.val() || {};

    for (const tc of Object.values(telecallers)) {
      const orders = tc.Orders || {};

      for (const phone of Object.keys(orders)) {
        for (const orderId of Object.keys(orders[phone])) {

          const o = orders[phone][orderId];

          if (o.awb === awb) {
            callback(o);
            return;
          }
        }
      }
    }

    callback(null);
  });
}


/* ================= CARD ================= */

function createCard(order, awb){

  const div = document.createElement("div");
  div.className = "bg-white text-black p-4 rounded shadow mb-4";
  div.id = `ofd-${awb}`;

  div.innerHTML = `
    <div class="flex justify-between">
      <div class="font-bold text-lg">${order.name}</div>
      <div class="text-sm font-semibold text-orange-600">
        Attempt: <span id="attempt-${awb}">0</span>
      </div>
    </div>

    <div>📞 ${order.phone}</div>
    <div>AWB: ${awb}</div>
    <div> Price: ₹${order.amount}</div>
    <div>Order ID: ${order.orderId}</div>

    <input
      id="remark-${awb}"
      placeholder="Enter remark"
      class="w-full border p-2 mt-2"
      onkeydown="handleRemarkEnter(event,'${awb}')"
    />

    <div class="flex gap-2 mt-2">
      <button onclick="saveRemark('${awb}')"
        class="bg-green-600 text-white px-3 py-1 rounded">
        Save
      </button>

      <button onclick="viewRemarks('${awb}')"
        class="bg-gray-700 text-white px-3 py-1 rounded">
        View
      </button>

      <select id="call-${awb}"
        onchange="saveCall('${awb}',this.value)"
        class="bg-blue-500 text-white px-2 py-1 rounded">
        <option value="">Call</option>
        <option value="AGREE">Agree</option>
        <option value="REFUSED">Refused</option>
        <option value="NOT PICKED">Not Picked</option>
      </select>
    </div>
  `;

  /* ===== REALTIME ATTEMPT UPDATE ===== */

  onValue(
    ref(db, `Telecallers/${emailKey}/OFD/${awb}/attempt`),
    snap => {
      const el = document.getElementById(`attempt-${awb}`);
      if (el) el.textContent = snap.val() || 0;
    }
  );

  /* ===== CALL STATUS REALTIME ===== */

  setTimeout(() => {
    const select = document.getElementById(`call-${awb}`);
    if (!select) return;

    onValue(
      ref(db, `Telecallers/${emailKey}/OFD/${awb}/callStatus`),
      snap => {

        const val = snap.val();
        if (!val) return;

        select.value = val;

        if (val === "AGREE")
          select.className="bg-green-600 text-white px-2 py-1 rounded";
        else if (val === "REFUSED")
          select.className="bg-red-600 text-white px-2 py-1 rounded";
        else if (val === "NOT PICKED")
          select.className="bg-yellow-500 text-black px-2 py-1 rounded";
      }
    );
  },0);

  return div;
}


/* ================= REMARKS ================= */

window.saveRemark = async (awb) => {

  const input = document.getElementById(`remark-${awb}`);
  const text = input.value.trim();
  if (!text) return;

  await set(
    ref(db,`Telecallers/${emailKey}/OFD/${awb}/remarks/${Date.now()}`),
    text
  );

  input.value="";
};


/* ================= VIEW REMARKS ================= */

window.viewRemarks = async (awb) => {

  const snap = await get(
    ref(db,`Telecallers/${emailKey}/OFD/${awb}/remarks`)
  );

  const data = snap.val() || {};

  const modal=document.createElement("div");
  modal.className="fixed inset-0 bg-black/60 flex items-center justify-center z-50";

  const box=document.createElement("div");
  box.className="bg-white text-black w-full max-w-lg rounded-lg p-4 relative";

  box.innerHTML=`
    <button class="absolute right-3 top-2 text-xl font-bold">✕</button>
    <h2 class="text-lg font-bold mb-3">Remark History</h2>
    <div class="max-h-80 overflow-y-auto space-y-2 bg-gray-100 p-3 rounded"></div>
  `;

  modal.appendChild(box);
  document.body.appendChild(modal);

  const container=box.querySelector("div:last-child");

  Object.entries(data)
    .sort((a,b)=>b[0]-a[0])
    .forEach(([t,text])=>{
      container.innerHTML+=`
        <div class="bg-white p-2 rounded border">
          <div class="text-xs text-gray-500">
            ${new Date(Number(t)).toLocaleString()}
          </div>
          <div>${text}</div>
        </div>`;
    });

  box.querySelector("button").onclick=()=>modal.remove();
  modal.onclick=e=>{ if(!box.contains(e.target)) modal.remove(); };
};


/* ================= CALL RESULT ================= */

window.saveCall = async (awb,val)=>{
  if(!val) return;
  await set(ref(db,`Telecallers/${emailKey}/OFD/${awb}/callStatus`),val);
};

window.handleRemarkEnter=(e,awb)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    saveRemark(awb);
  }
};
</script>
</head>

<body class="bg-slate-900 text-white p-6">
<h1 class="text-2xl font-bold mb-4">Out For Delivery</h1>

<div id="ofdContainer"></div>


</body>
</html>
