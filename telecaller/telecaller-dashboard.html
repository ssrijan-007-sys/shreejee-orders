    const location = data.delivery_codes[0]?.postal_code || {};

isServiceable = true;

awbBtn.disabled = false;

stateInput.value = state;

  } catch (err) {

/* ================= WAYBILL ================= */
async function getWaybill() {
  const snap = await get(ref(db, "Waybills/unused"));
  const data = snap.val() || {};

  for (const awb in data) {
    await remove(ref(db, `Waybills/unused/${awb}`));
    await set(ref(db, `Waybills/used/${awb}`), {
      usedAt: Date.now(),
      telecaller: authUser.email
    });
    return awb;
  }
  throw new Error("No waybill available");
}

/* ================= SAVE ORDER ================= */
async function saveOrder(assignAwb) {
  const v = id => document.getElementById(id).value.trim();

  if (![v("name"),v("phone"),v("pin"),v("address"),v("orderAmount")].every(Boolean)) {
    showCustomAlert("❌ All fields required");
    return;
  }

  if (!/^\d{10}$/.test(v("phone"))) return showCustomAlert("❌ Phone must be 10 digits");
  if (!/^\d{6}$/.test(v("pin"))) return showCustomAlert("❌ Pincode must be 6 digits");

  let awb = null;
  let status = "PENDING";
  const scheduleDate = document.getElementById("scheduleDate").value;
  const scheduleTimestamp = scheduleDate ? new Date(scheduleDate).setHours(0,0,0,0) : null;
  const today = new Date().setHours(0,0,0,0);



  if (scheduleTimestamp && scheduleTimestamp > today) {

  const scheduledOrder = {
    name: v("name"),
    phone: v("phone"),
    pin: v("pin"),
    city: v("city"),
    state: v("state"),
    address: v("address"),
    amount: v("orderAmount"),
    quantity: v("quantity") || 1,
    paymentMode: paymentMode.value,
    scheduleDate: scheduleTimestamp,
    createdAt: Date.now()
  };

  const orderId = "SJ" + Date.now();

  await set(
    ref(db, `Telecallers/${emailKey}/ScheduledOrders/${orderId}`),
    scheduledOrder
  );

  showCustomAlert("📅 Order scheduled successfully");
  clearOrderModal();
  closeModal();
  return;
}

  if (assignAwb) {
    if (!isServiceable) return showCustomAlert("❌ Not serviceable");
    awb = await getWaybill();
    status = "AWB GENERATED";
  }

  const orderId = "SJ" + Date.now();
  const phoneKey = v("phone");

  const order = {
    orderId,
    awb,
    name: v("name"),
    phone: phoneKey,
    pin: v("pin"),
    city: v("city"),
    state: v("state"),
    address: v("address"),
    amount: v("orderAmount"),
    quantity: v("quantity") || 1,
    paymentMode: paymentMode.value,
    status,
    createdAt: Date.now(),
    trackable: !!awb,

  await set(ref(db, `Telecallers/${emailKey}/Orders/${phoneKey}/${orderId}`), order);
  if (awb) {
  await set(ref(db, `TrackingQueues/normal/${awb}`), true);
}


  clearOrderModal();
  closeModal();


  if (assignAwb) {
  const delhiveryPayload = {
  shipments: [{
    name: order.name,
    phone: order.phone,
    add: order.address,      // ✅ FIXED
    pin: order.pin,        // ✅ STRONGLY RECOMMENDED
    order: order.orderId,
    payment_mode: order.paymentMode,
    cod_amount:
      order.paymentMode === "COD" ? Number(order.amount) : 0,
    waybill: awb,
    quantity: order.quantity || 1,
    shipment_width: "10",    // ✅ OPTIONAL BUT SAFE

    shipment_length: 10 * (order.quantity || 1),
    weight: 300 * (order.quantity || 1),
    products_desc: "Sugar Medicine",
    shipping_mode: "Surface",
    return_phone: 8449957169
  }],
  pickup_location: {
    name: "Jatin Home"
  }
};


  const res = await fetch(
    "https://shreejee-delhivery-proxy.deno.dev/create-order",
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(delhiveryPayload)
    }
  );

  const result = await res.json();

  if (result?.success === false) {

  await set(ref(db, `Telecallers/${emailKey}/Orders/${phoneKey}/${orderId}/trackable`), false);

let searchQuery = "";
let selectedStatus = "ALL";
let selectedDateRange = "LIFETIME";
let customFromDate = null;
let customToDate = null;


/* ================= RENDER ================= */
async function renderOrders() {
  onValue(ref(db, `Telecallers/${emailKey}/Orders`), (snap) => {
    const data = snap.val() || {};

  // 🔥 1️⃣ Keep only latest order per phone
  const latestOrdersMap = {};

  Object.values(data).forEach(group => {
    Object.values(group).forEach(order => {
      const phone = order.phone;

      if (
        !latestOrdersMap[phone] ||
        order.createdAt > latestOrdersMap[phone].createdAt
      ) {
        latestOrdersMap[phone] = order;
      }
    });
  });

  let allOrders = Object.values(latestOrdersMap);

  const now = Date.now();

// 🔍 SEARCH FILTER
allOrders = allOrders.filter(o => {
  if (!searchQuery) return true;
  return (
    o.name?.toLowerCase().includes(searchQuery) ||
    o.phone?.includes(searchQuery)
  );
});

// 🎯 STATUS FILTER
if (selectedStatus !== "ALL") {
  allOrders = allOrders.filter(o =>
    o.status?.toUpperCase().includes(selectedStatus)
  );
}

// 📅 DATE FILTER
allOrders = allOrders.filter(o => {
  const createdAt = o.createdAt;
  if (!createdAt) return false;

  switch (selectedDateRange) {
    case "TODAY":
      return new Date(createdAt).toDateString() === new Date().toDateString();

    case "LAST_WEEK":
      return createdAt >= now - 7 * 24 * 60 * 60 * 1000;

    case "THIS_MONTH": {
      const d = new Date(createdAt);
      const n = new Date();
      return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
    }

    case "LAST_MONTH": {
      const d = new Date(createdAt);
      const n = new Date();
      const lastMonth = new Date(n.getFullYear(), n.getMonth() - 1, 1);
      return d.getMonth() === lastMonth.getMonth() &&
             d.getFullYear() === lastMonth.getFullYear();
    }

    case "CUSTOM":
      if (!customFromDate || !customToDate) return true;
      return createdAt >= customFromDate && createdAt <= customToDate;

    default:
      return true; // LIFETIME
  }
});

document.getElementById("ordersTotal").innerText = `Total: ${allOrders.length}`;

  if (!allOrders.length) {
    ordersContainer.innerHTML = "<p>No orders</p>";
    return;
  }

  // 2️⃣ Sort latest first
  allOrders.sort((a, b) => b.createdAt - a.createdAt);

  // 3️⃣ Group by date
  const groupedByDate = {};

  allOrders.forEach(o => {
    const d = new Date(o.createdAt);
    const dateKey = `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;

    if (!groupedByDate[dateKey]) groupedByDate[dateKey] = [];
    groupedByDate[dateKey].push(o);
  });

  // 4️⃣ Render UI
  let html = "";

  Object.entries(groupedByDate).forEach(([date, orders]) => {
    html += `
      <div class="bg-black/30 p-4 rounded-lg mb-4">
        <div class="text-lg font-bold mb-3 text-blue-400">📅 ${date}</div>

        ${orders.map(o => `
          <div class="bg-white/10 p-3 mb-2 rounded flex justify-between items-center border-2 ${getStatusBorder(o.status)} ${getStatusGlow(o.status)}">



            <div>
              <div class="font-semibold">${o.name} | ${o.phone} |  ₹ ${o.amount}</div>
              <span onclick="openTracking('${o.awb}')"
                  class="cursor-pointer underline ${getStatusColor(o.status)}">
                  ${o.status}
                </span>



                <div class="flex gap-2 mt-1">
                  ${o.status === "PENDING" ? `
                    <button onclick="retryAwb('${o.phone}', '${o.orderId}')"
                      class="bg-yellow-500 text-black px-2 py-1 rounded text-xs">
                      Try Again
                    </button>
                  ` : ""}
                  ${o.status === "AWB GENERATED" ? `
                  <button onclick="editShipment('${o.phone}', '${o.orderId}')"
                    class="bg-blue-500 text-black px-2 py-1 rounded text-xs"> 
                    Edit
                  </button>
                  `: ""}

                  ${o.status === "AWB GENERATED" ?`
                  <button onclick="cancelShipment('${o.phone}', '${o.orderId}')"
                    class="bg-red-600 text-black px-2 py-1 rounded text-xs">
                    Cancel
                  </button>
                  `:""}
                </div>


              ${o.awb ? `<div class="text-green-400 text-sm">AWB: ${o.awb}</div>` : ""}
              <div class="text-green-400 text-sm">Order ID: ${o.orderId}</div>
            </div>

            <button onclick='openViewModal("${o.phone}")'
              class="bg-blue-600 px-3 py-1 rounded text-sm">
              View
            </button>
          </div>
        `).join("")}
      </div>
    `;
  });

  ordersContainer.innerHTML = html;
});
}

function getStatusColor(status) {
  if (!status) return "text-gray-300";

  status = status.toUpperCase();

  if (status.includes("CANCELLED")) return "text-red-500 font-bold";
  if (status.includes("DELIVERED")) return "text-green-500 font-bold";
  if (status.includes("OUT FOR DELIVERY")) return "text-orange-400 font-bold";
  if (status.includes("PENDING")) return "text-yellow-400 font-bold";
  if (status.includes("AWB")) return "text-blue-400";
  if (status.includes("TRANSIT")) return "text-blue-400";
  if (status.includes("RTO")) return "text-red-500 font-bold";

  return "text-white300";
}

function getStatusBorder(status) {
  if (!status) return "border-gray-500";

  status = status.toUpperCase();

  if (status.includes("CANCEL")) return "border-red-500";
  if (status.includes("DELIVERED")) return "border-green-500";
  if (status.includes("OUT FOR DELIVERY")) return "border-orange-400";
  if (status.includes("PENDING")) return "border-yellow-400";
  if (status.includes("AWB") || status.includes("TRANSIT")) return "border-blue-400";
  if (status.includes("RTO")) return "border-red-500";

  return "border-white-500";
}

function getStatusGlow(status) {
  if (!status) return "";

  status = status.toUpperCase();

  if (status.includes("CANCEL")) return "shadow-[0_0_10px_rgba(239,68,68,0.6)]";
  if (status.includes("DELIVERED")) return "shadow-[0_0_10px_rgba(34,197,94,0.6)]";
  if (status.includes("OUT FOR DELIVERY")) return "shadow-[0_0_10px_rgba(251,146,60,0.6)]";
  if (status.includes("PENDING")) return "shadow-[0_0_10px_rgba(234,179,8,0.6)]";
  if (status.includes("AWB") || status.includes("TRANSIT")) return "shadow-[0_0_10px_rgba(59,130,246,0.6)]";
  if (status.includes("RTO")) return "shadow-[0_0_10px_rgba(156,163,175,0.6)]";

  return "shadiow-[0_0_10px_rgba(0,0,0,0.6)]";
  
}

async function retryAwb(phone, orderId) {
  const orderRef = ref(db, `Telecallers/${emailKey}/Orders/${phone}/${orderId}`);
  const snap = await get(orderRef);
  const order = snap.val();
  if (!order) return showCustomAlert("Order not found");

  await checkServiceability(order.pin);
  if (!isServiceable) return showCustomAlert("Still not serviceable");

  const awb = await getWaybill();

  const delhiveryPayload = {
    shipments: [{
      name: order.name,
      phone: order.phone,
      add: order.address,
      pin: order.pin,
      order: order.orderId,
      payment_mode: order.paymentMode,
      cod_amount: order.paymentMode === "COD" ? Number(order.amount) : 0,
      quantity: order.quantity || 1,
      waybill: awb,
      shipment_width: "10",
      shipment_height: "10",
      shipment_length: 10 * (order.quantity || 1),
      weight: 300 * (order.quantity || 1),
      products_desc: "Sugar Medicine",
      shipping_mode: "Surface",
      return_phone: 8449957169
    }],
    pickup_location: { name: "Jatin Home" }
  };

  const res = await fetch("https://shreejee-delhivery-proxy.deno.dev/create-order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(delhiveryPayload)
  });

  const result = await res.json();
  console.log("Retry manifest response:", result);

  // Only update Firebase AFTER success
  if (result?.success === false || result?.error) {
    showCustomAlert("Retry failed. Still pending.");
    return;
  }

  await set(ref(db, `Telecallers/${emailKey}/Orders/${phone}/${orderId}/awb`), awb);
  await set(ref(db, `Telecallers/${emailKey}/Orders/${phone}/${orderId}/status`), "AWB GENERATED");
  await set(ref(db, `Telecallers/${emailKey}/Orders/${phone}/${orderId}/trackable`), true);
  await set(ref(db, `Telecallers/${emailKey}/Orders/${phone}/${orderId}/lastTrackedAt`), 0);
  await set(ref(db, `Telecallers/${emailKey}/Orders/${phone}/${orderId}/createdAt`), Date.now());

  showCustomAlert("✅ AWB Assigned Successfully");
}


window.retryAwb = retryAwb;



async function editShipment(phone, orderId) {
  const snap = await get(ref(db, `Telecallers/${emailKey}/Orders/${phone}/${orderId}`));
  const order = snap.val();
  if (!order || !order.awb) return showCustomAlert("No AWB assigned");

  const newWeight = prompt("Enter new weight (gm)", "100");
  const newHeight = prompt("Enter new height (cm)", "40");

  if (!newWeight || !newHeight) return;

  const payload = {
    waybill: order.awb,
    pt: order.paymentMode,
    cod: order.paymentMode === "COD" ? Number(order.amount) : 0,
    shipment_height: Number(newHeight),
    weight: Number(newWeight)
  };

  const res = await fetch("https://shreejee-delhivery-proxy.deno.dev/edit-shipment", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  });

  const data = await res.json();
  if (!data.success) return alert("Edit failed");

  alert("✅ Shipment Updated");
}

window.editShipment = editShipment;

async function cancelShipment(phone, orderId) {
  if (!confirm("Are you sure to cancel shipment?")) return;

  const snap = await get(ref(db, `Telecallers/${emailKey}/Orders/${phone}/${orderId}`));
  const order = snap.val();
  if (!order || !order.awb) return showCustomAlert("No AWB assigned");

  const res = await fetch("https://shreejee-delhivery-proxy.deno.dev/cancel-shipment", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ waybill: order.awb })
  });

  const data = await res.json();
  console.log("Delhivery Cancel Response:", data);

  const isSuccess =
    data?.Success === true ||
    data?.Status === "CANCELLED" ||
    !data?.error;

  if (!isSuccess) {
    return showCustomAlert("❌ Cancel failed (Check Console)");
  }

  await set(ref(db, `Telecallers/${emailKey}/Orders/${phone}/${orderId}/status`), "CANCELLED");

  showCustomAlert("✅ Shipment Cancelled");
  renderOrders();
}

window.cancelShipment = cancelShipment;

  trackingEngineStarted = true;

  console.log("Flag" , trackingEngineStarted);
  console.log("Tracking engine started");

  setInterval(runTrackingWorker, 60000); // heartbeat only
  runTrackingWorker(); // initial run
}

async function runTrackingWorker() {
  const now = Date.now();

  const snap = await get(ref(db, "Telecallers"));
  const telecallers = snap.val() || {};

  const awbsToTrack = [];

  for (const tcKey of Object.keys(telecallers)) {
    const ordersByPhone = telecallers[tcKey].Orders || {};

    for (const phone of Object.keys(ordersByPhone)) {
      for (const orderId of Object.keys(ordersByPhone[phone])) {
        const order = ordersByPhone[phone][orderId];

        if (!order.trackable || !order.awb) continue;

        const last = order.lastTrackedAt || 0;

        // first tracking
        if (last === 0) {
          awbsToTrack.push(order.awb);
          continue;
        }

        const interval =
          order.status === "OUT FOR DELIVERY"
            ? 4 * 60 * 1000
            : 30 * 60 * 1000;

        if (now - last >= interval) {
          awbsToTrack.push(order.awb);
        }
      }
    }
  }

  if (!awbsToTrack.length) return;

  for (let i = 0; i < awbsToTrack.length; i += 50) {
    const batch = awbsToTrack.slice(i, i + 50);
    await trackBatch(batch);
  }
}


async function trackBatch(awbs) {
  console.log("Tracking batch AWBs:", awbs);

  const res = await fetch(
    `https://shreejee-delhivery-proxy.deno.dev/track?waybills=${awbs.join(",")}`
  );

  const data = await res.json();
  const shipments = data?.ShipmentData || [];
  console.log("RAW PKG FROM DELHIVERY:", data);


  for (const pkg of shipments) {
    await handleTrackingUpdate(pkg);
  }
}


async function handleTrackingUpdate(pkg) {
  const shipment = pkg?.Shipment;
  if (!shipment) return;

  const awb = shipment.AWB;
  if (!awb) return;

  const scans = shipment.Scans || [];
  if (!scans.length) return;

  const latestScan = scans[scans.length - 1];
  const status = resolveStatusFromScan(latestScan);
  const now = Date.now();

  await set(ref(db, `Tracking/${awb}`), {
    status,
    scans,
    updatedAt: now
  });

  const snap = await get(ref(db, "Telecallers"));
  const telecallers = snap.val() || {};

  for (const tcKey of Object.keys(telecallers)) {
    const orders = telecallers[tcKey].Orders || {};

    for (const phone of Object.keys(orders)) {
      for (const orderId of Object.keys(orders[phone])) {
        const order = orders[phone][orderId];
        if (order.awb !== awb) continue;

        let trackable = true;

        if (["DELIVERED", "RTO", "CANCELLED"].includes(status)) {
          trackable = false;
        }

        const updatedOrder = {
  ...order,
  status: status,
  trackable: trackable,
  lastTrackedAt: now
};

await set(
  ref(db, `Telecallers/${tcKey}/Orders/${phone}/${orderId}`),
  updatedOrder
);

/* ===== MOVE TO DELIVERED NODE ===== */

if(status === "DELIVERED"){

  const deliveredData = {
    ...updatedOrder,
    deliveredAt: now
  };

  await set(
    ref(db, `Telecallers/${tcKey}/Delivered/${phone}/${orderId}`),
    deliveredData
  );

}


        if (status === "OUT FOR DELIVERY") {
          const addedTime = Date.now();

      await set(
        ref(db, `Telecallers/${tcKey}/OFD/${awb}`),
        { addedTime }
      );
        }

        
      }
    }
  }
}



function resolveStatusFromScan(scan) {
  const detail = scan?.ScanDetail || {};

  const scanType = detail.ScanType || "";
  const instruction = (detail.Instructions || "").toLowerCase();
  const scanText = (detail.Scan || "").toLowerCase();

  if (scanType === "RT") return "RTO";

  if (instruction.includes("out for delivery") || instruction.includes("call placed to consignee")) {
    if (scan?.AWB) {
      const awb = scan.AWB;
      
    }
    return "OUT FOR DELIVERY";
  }

  if (scanText.includes("manifest")) return "AWB GENERATED";
  if (scanText.includes("transit")) return "IN TRANSIT";
  if (scanText.includes("delivered")) return "DELIVERED";
  if (scanText.includes("not picked")) return "CANCELLED";

  return "PICKED";
}



function normalizeDelhiveryStatus(raw) {
  if (!raw) return "UNKNOWN";

  const status = raw.toUpperCase();

  if (status.includes("DELIVERED")) return "DELIVERED";
  if (status.includes("RTO")) return "RTO - RETURNED";
  if (status.includes("OUT FOR DELIVERY")) return "OUT FOR DELIVERY";
  if (status.includes("IN TRANSIT")) return "IN TRANSIT";
  if (status.includes("PICKED")) return "PICKED";
  if (status.includes("MANIFEST")) return "AWB GENERATED";

  return status;
}


function clearOrderModal() {
  document.querySelectorAll("#orderModal input, #orderModal select")
    .forEach(el => {
      if (el.id === "quantity") {
        el.value = "1";
      }
      else if(el.id === "paymentMode") {
        el.value = "COD";
      }
      else {
        el.value = "";
      }
    });

  document.getElementById("pinStatus").textContent = "";
  document.getElementById("awbBtn").disabled = true;
}

function showCustomAlert(message) {
  document.getElementById("customAlertMessage").innerText = message;
  document.getElementById("customAlert").classList.remove("hidden");
}

function closeCustomAlert() {
  document.getElementById("customAlert").classList.add("hidden");
}


async function runScheduledOrdersWorker() {

  const today = new Date().setHours(0,0,0,0);

  const snap = await get(ref(db, `Telecallers/${emailKey}/ScheduledOrders`));
  const scheduled = snap.val() || {};

  for (const orderId of Object.keys(scheduled)) {

    const order = scheduled[orderId];

    if (!order.scheduleDate) continue;
    if (order.scheduleDate > today) continue;

    console.log("Processing scheduled order:", orderId);

    try {

      /* ===== GENERATE AWB ===== */
      const awb = await getWaybill();
      const phoneKey = order.phone;

      const newOrder = {
        ...order,
        orderId,
        awb,
        status: "AWB GENERATED",
        createdAt: Date.now(),
        trackable: true,
        lastTrackedAt: 0
      };

      /* ===== SAVE ORDER ===== */

      await set(
        ref(db, `Telecallers/${emailKey}/Orders/${phoneKey}/${orderId}`),
        newOrder
      );

      await set(ref(db, `TrackingQueues/normal/${awb}`), true);

      /* ===== MANIFEST TO DELHIVERY ===== */

      const payload = {
        shipments: [{
          name: order.name,
          phone: order.phone,
          add: order.address,
          pin: order.pin,
          order: orderId,
          payment_mode: order.paymentMode,
          cod_amount: order.paymentMode === "COD"
            ? Number(order.amount)
            : 0,
          quantity: order.quantity || 1,
          waybill: awb,
          shipment_width: "10",
          shipment_height: "10",
          shipment_length: 10 * (order.quantity || 1),
          weight: 300 * (order.quantity || 1),
          products_desc: "Sugar Medicine",
          shipping_mode: "Surface",
          return_phone: 8449957169
        }],
        pickup_location: { name: "Jatin Home" }
      };

      const res = await fetch(
        "https://shreejee-delhivery-proxy.deno.dev/create-order",
        {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify(payload)
        }
      );

      const result = await res.json();
      console.log("Scheduled manifest response:", result);

      if (result?.success === false) {

        await set(
          ref(db, `Telecallers/${emailKey}/Orders/${phoneKey}/${orderId}/status`),
          "PENDING"
        );

        await set(
          ref(db, `Telecallers/${emailKey}/Orders/${phoneKey}/${orderId}/trackable`),
          false
        );

        showCustomAlert("❌ Scheduled order failed. Status set to PENDING. Try again after 24 hours.");
      }

      /* ===== DELETE SCHEDULED ORDER ===== */

      await remove(
        ref(db, `Telecallers/${emailKey}/ScheduledOrders/${orderId}`)
      );

    } catch(err) {

      console.error("Scheduled order failed:", err);

    }
  }
}


</script>
